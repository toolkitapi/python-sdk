name: Publish to PyPI

on:
  push:
    tags:
      - "python-sdk-v*"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clean previous build artifacts
        run: |
          rm -rf dist build
          find . -maxdepth 2 -type d -name "*.egg-info" -exec rm -rf {} +

      - name: Install build tools
        run: pip install --upgrade build

      - name: Build distribution
        run: python -m build

      - name: Show built files
        run: ls -la dist/

      - name: Stage only current tag artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#python-sdk-v}"
          echo "Publishing version: ${VERSION}"

          mkdir -p publish_dist
          shopt -s nullglob
          files=(dist/toolkitapi-"${VERSION}"*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No artifacts found for toolkitapi-${VERSION} in dist/"
            exit 1
          fi

          cp -v "${files[@]}" publish_dist/
          echo "Staged files for upload:"
          ls -la publish_dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish_dist/
          skip-existing: true
